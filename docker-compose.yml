services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Server
      - PORT=8080
      - BASE_URL=http://localhost:8080

      # Redis
      - REDIS_ADDR=redis:6379
      - REDIS_TTL=24h
      - REDIS_POOL_SIZE=20
      - REDIS_MIN_IDLE_CONNS=5
      - REDIS_READ_TIMEOUT=2s
      - REDIS_WRITE_TIMEOUT=2s
      - REDIS_DIAL_TIMEOUT=3s

      # SQLite
      - DB_PATH=/app/data/qrcode.db
      - DB_MAX_OPEN_CONNS=25
      - DB_MAX_IDLE_CONNS=5
      - DB_CONN_MAX_LIFETIME=5m

      # Circuit Breaker
      - BREAKER_MAX_REQUESTS=3
      - BREAKER_INTERVAL=10s
      - BREAKER_TIMEOUT=5s
      - BREAKER_FAIL_THRESHOLD=5

      # Token
      - TOKEN_LENGTH=8
      - TOKEN_MAX_RETRIES=5

      # QR Code
      - MAX_URL_LENGTH=20
      - DEFAULT_QR_DIMENSION=256
      - MAX_QR_DIMENSION=1024
      - CACHE_MAX_AGE=86400
    volumes:
      - db-data:/app/data
    depends_on:
      - redis

volumes:
  db-data:
